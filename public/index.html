<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Village Rentals</title>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Link: https://unsplash.com/illustrations/a-simple-blue-shopping-cart-icon-7-1CXVNxApQ -->
  <link rel="icon" type="image/png" href="/img/tab_icon.png">
</head>

<body>
  <header class="app-header">
    <h1><a href="/">Village Rentals</a></h1>
    <nav>
      <a href="/">Home</a>
      <a href="/equipment.html">Equipment</a>
      <a href="/customers.html">Customers</a>
      <a href="/rentals.html">Rentals</a>
    </nav>
  </header>

  <main>
    <div class="welcome_sign">
      <h2>Welcome to Village Rentals</h2>
      <p>Manage your equipment inventory, customers, and rentals all in one place.</p>
    </div>

    <div class="grid-boxes">
      <a class="box" href="/equipment.html">
        <span class="box-title">Equipment</span>
        <span class="box-description">Manage your equipment inventory</span>
        <!-- add image 'equipment_image.png' -->
         <!-- Link: https://unsplash.com/photos/a-wooden-wall-with-tools-hanging-on-it-c3wqDVRmtj4 -->
        <img src="/img/equipment_image.jpg" alt="Equipment" class="box-image">
      </a>
      <a class="box" href="/customers.html">
        <span class="box-title">Customers</span>
        <span class="box-description">View and manage customer information</span>
        <!-- Link: https://unsplash.com/illustrations/a-group-of-men-with-different-facial-expressions-oAi070AnwNM -->
        <img src="/img/customer_image.png" alt="Customers" class="box-image">
      </a>
      <a class="box" href="/rentals.html">
        <span class="box-title">Rentals</span>
        <span class="box-description">Process equipment rentals</span>
        <!-- Link: https://unsplash.com/illustrations/man-looking-at-online-shopping-options-fQNsVdOGG1w -->
        <img src="/img/rental_image.jpg" alt="Rentals" class="box-image">
      </a>
    </div>


  </main>

</html>
